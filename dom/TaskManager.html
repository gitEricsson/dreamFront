<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div id="wrapper">
        <header>
            <div id="page-banner">
                <h1 class="title">Task Manager</h1>

                <form id="search-tasks">
                    <input type="text" placeholder="Search tasks..." />
                </form>
            </div>
        </header>

        <div id="task-list">
            <h2 class="title">Tasks to Do</h2>

            <ul>
                <li>
                    <span class="name">Learn JavaScript</span>
                    <span class="delete">delete</span>
                </li>

                <li>
                    <span class="name">Practice DOM Manipulation</span>
                    <span class="delete">delete</span>
                </li>

                <li>
                    <span class="name">Build a mini project</span>
                    <span class="delete">delete</span>
                </li>

                <li>
                    <span class="name">Revise CSS Flexbox</span>
                    <span class="delete">delete</span>
                </li>
            </ul>
        </div>

        <form id="add-task">
            <input id="add-task-input" type="text" placeholder="Add a task..." />
            <button>Add</button>
        </form>

    </div>
    <script src="./script.js"></script>
</body>
</html>
